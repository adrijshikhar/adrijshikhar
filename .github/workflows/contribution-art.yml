name: contribution-art

on:
  schedule:
    - cron: "0 0 * * *"   # daily at 00:00 UTC
  workflow_dispatch:

# Least privilege: only what the push needs.
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
        with:
          persist-credentials: false

      # Docker-based generators (snake, pac-man) run as root and would otherwise
      # create dist/ root-owned, breaking the later cp by the runner user.
      # Pre-create it world-writable so every step can write regardless of uid.
      - name: Prepare dist
        run: |
          mkdir -p dist
          chmod 777 dist

      - name: Generate snake
        # Pinned to v3.5.0 (the release line that supports the multi-`outputs` input;
        # master HEAD carried an older single-output interface).
        uses: Platane/snk@d8f6715049803e982ee5ff501b6b9b7d5deeb09b
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/snake-dark.svg?palette=github-dark

      - name: Generate Pac-Man graph
        # NOTE: this action has no `output` input. With games=pacman it writes
        # dist/pacman-contribution-graph.svg (light) and
        # dist/pacman-contribution-graph-dark.svg (dark).
        # It is memory-heavy (Canvas render) and can OOM the runner — bump the Node heap
        # and keep it non-fatal so snake/3D/publish still succeed (graceful degradation).
        continue-on-error: true
        uses: abozanona/pacman-contribution-graph@93ebd01187d837d03fa069d7080a82ff11027953
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          games: pacman

      - name: Generate 3D contribution calendar
        # NOTE: this action takes NO `with:` inputs — username/token are env vars.
        uses: yoshi389111/github-profile-3d-contrib@f234ae01c07dcb685fd5f259ffc24bacb1fe7314
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Stage 3D output into dist
        # The 3D action writes into profile-3d-contrib/; the night variant file
        # is named profile-night-view.svg (there is no plain profile-night.svg).
        run: |
          cp profile-3d-contrib/profile-night-view.svg dist/3d-contrib.svg

      - name: Publish to output branch
        uses: peaceiris/actions-gh-pages@cf520ea9ea08068ea9439a7378a287ad8580e645
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
          keep_files: true
          enable_jekyll: true
